# Catppuccin Latte (Light) theme for Tmux

# Entire status bar style (darker background for better visibility)
set -g status-style bg='#ccd0da',fg='#4c4f69'

# Inactive window style
setw -g window-status-style bg='#bcc0cc'
setw -g window-status-format " #[fg=#5c5f77]#I #[fg=#4c4f69]#W "

# Active window style (even darker background, text bold)
setw -g window-status-current-style bg='#acb0be'
setw -g window-status-current-format " #[fg=#4c4f69]#I #[fg=#4c4f69,bold]#W "

# Pane borders (blue for active window for better visibility)
set -g pane-border-style fg='#9ca0b0'
set -g pane-active-border-style fg='#1e66f5'

# Right side: time and session name
set -g status-right '#[fg=#6c6f85]| #[fg=#4c4f69]⧖ %H:%M #[fg=#6c6f85]| #[fg=#4c4f69]◆ #S #[default]'
